data:
  dataset: maestro
  train_dir: data/processed/maestro/train
  val_dir: data/processed/maestro/validation
  sample_rate: 16000
  segment_samples: 32768
  n_frames: 256

audio:
  n_fft: 2048
  hop_length: 128
  n_mels: 512

model:
  d_model: 512
  nhead: 8
  enc_layers: 8
  dec_layers: 8
  d_ff: 2048
  dropout: 0.1
  max_token_len: 1024
  use_2d_patches: false
  patch_f: 64
  patch_t: 8
  use_pitch_aware_attention: false
  use_rope: false
  use_conv_frontend: false
  conv_layers: 2

tokenizer:
  multi_instrument: true   # piano-only, no program tokens
  num_programs: 129
  time_step_ms: 8
  max_time_steps: 600
  use_hierarchical_time: false
  coarse_step_ms: 64
  num_coarse: 75

training:
  batch_size: 4
  grad_accum_steps: 8
  lr: 0.00003              # 10x lower than scratch — key for finetuning
  warmup_steps: 1000       # shorter warmup
  max_steps: 100000         # much shorter run
  weight_decay: 0.01
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 100
  save_every: 5000
  eval_every: 5000
  patience: 10
  num_workers: 4
  fp16: false
  bf16: true
