data:
  dataset: slakh
  train_dir: data/processed/slakh/train
  val_dir: data/processed/slakh/validation
  sample_rate: 16000
  segment_samples: 32768
  n_frames: 256

audio:
  n_fft: 2048
  hop_length: 128
  n_mels: 512

model:
  d_model: 256                       # smaller than baseline (512) — tests size/quality tradeoff
  nhead: 4                           # must divide d_model evenly
  enc_layers: 6                      # 6 instead of 8 to keep compute proportional
  dec_layers: 6
  d_ff: 1024                         # 4x d_model
  dropout: 0.1
  max_token_len: 1024
  use_2d_patches: false
  patch_f: 64
  patch_t: 8
  use_pitch_aware_attention: false

tokenizer:
  multi_instrument: true
  num_programs: 129                  # 0-127 MIDI programs + drum ID 128
  time_step_ms: 8
  max_time_steps: 600
  use_hierarchical_time: false
  coarse_step_ms: 64
  num_coarse: 75

training:
  batch_size: 4
  grad_accum_steps: 8                # effective batch = 32
  lr: 0.0001                         # same as slakh_multi baseline
  warmup_steps: 4000
  max_steps: 200000                  # longer than M1 piano (100k) — multi-instrument harder
  max_epochs: 200
  weight_decay: 0.01
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 100
  save_every: 10000
  eval_every: 10000
  patience: 10
  num_workers: 4
  fp16: false
  bf16: true
