# Local config for Slakh2100 multi-instrument — RTX 4070 Ti (12 GB VRAM).
#
# Key differences vs colab_slakh_multi.yaml:
#   - batch_size: 4 / grad_accum: 8  (12 GB VRAM; keeps effective batch = 32)
#   - num_workers: 8  (local machine has more CPUs than Colab)
#   - save_every: 10000  (no session timeout risk locally)
#
# Run:
#   python scripts/train.py --config configs/local_slakh_multi.yaml

data:
  dataset: slakh
  train_dir: data/processed/slakh/train
  val_dir: data/processed/slakh/validation
  sample_rate: 16000
  segment_samples: 32768
  n_frames: 256

audio:
  n_fft: 4096                     # needs >=4096 for 512 mel filters to be non-zero
  hop_length: 128
  n_mels: 512

model:
  d_model: 512
  nhead: 8
  enc_layers: 8
  dec_layers: 8
  d_ff: 2048
  dropout: 0.1
  max_token_len: 1024
  use_2d_patches: true
  patch_f: 64
  patch_t: 8
  use_pitch_aware_attention: true
  use_rope: true
  use_conv_frontend: true
  conv_layers: 2

tokenizer:
  multi_instrument: true
  num_programs: 129               # 0-127 plus dedicated drum ID 128
  time_step_ms: 8
  max_time_steps: 600
  use_hierarchical_time: true
  coarse_step_ms: 64
  num_coarse: 75

training:
  batch_size: 4                   # 4070 Ti 12 GB — safe with this model size
  grad_accum_steps: 8             # effective batch = 32
  lr: 0.0001
  warmup_steps: 4000
  max_steps: 300000
  max_epochs: 200
  weight_decay: 0.01
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 100
  save_every: 10000
  eval_every: 10000
  patience: 10
  num_workers: 8                  # local machine — more CPUs available
  fp16: false
  bf16: true                      # 4070 Ti (Ada Lovelace) supports bf16 natively
