data:
  dataset: maestro
  train_dir: data/processed/maestro/train
  val_dir: data/processed/maestro/validation
  sample_rate: 16000
  segment_samples: 32768           # 2.048 seconds at 16 kHz (256 frames * 128 hop)
  n_frames: 256                    # target encoder frames per example

audio:
  n_fft: 2048
  hop_length: 128
  n_mels: 512

model:
  d_model: 512
  nhead: 8
  enc_layers: 8
  dec_layers: 8
  d_ff: 2048
  dropout: 0.1
  max_token_len: 1024

tokenizer:
  multi_instrument: false
  time_step_ms: 8
  max_time_steps: 600

training:
  batch_size: 4                    # per GPU; use gradient accumulation for larger
  grad_accum_steps: 4              # effective batch = 16
  lr: 0.0003                       # peak learning rate
  warmup_steps: 4000
  max_steps: 500000
  max_epochs: 200
  weight_decay: 0.01
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 100
  save_every: 10000
  eval_every: 10000
  patience: 10                     # early stopping after 10 evals without improvement
  num_workers: 4
  fp16: false
  bf16: true
