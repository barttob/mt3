# Colab-optimised config for MAESTRO piano transcription.
#
# Key differences vs maestro_piano.yaml:
#   - fp16 instead of bf16  (T4/V100 don't support bfloat16; only A100+ does)
#   - paths point to Google Drive  (/content/drive/MyDrive/mt3/...)
#   - save_every: 2000  (Colab sessions time-out — checkpoint more often)
#   - num_workers: 2    (Colab CPU quota is limited)
#   - batch_size: 2 / grad_accum: 16  (T4 has 15 GB; keeps effective batch=32)
#
# Mount Drive and set paths before training:
#   from google.colab import drive
#   drive.mount('/content/drive')
#
# Then run:
#   python scripts/train.py --config configs/colab_maestro.yaml

data:
  dataset: maestro
  train_dir: /content/drive/MyDrive/mt3/data/processed/maestro/train
  val_dir: /content/drive/MyDrive/mt3/data/processed/maestro/validation
  sample_rate: 16000
  segment_samples: 32768           # 2.048 s at 16 kHz
  n_frames: 256

audio:
  n_fft: 2048
  hop_length: 128
  n_mels: 512

model:
  d_model: 512
  nhead: 8
  enc_layers: 8
  dec_layers: 8
  d_ff: 2048
  dropout: 0.1
  max_token_len: 1024
  use_2d_patches: false
  patch_f: 64
  patch_t: 8
  use_pitch_aware_attention: false
  use_rope: false
  use_conv_frontend: false
  conv_layers: 2

tokenizer:
  multi_instrument: false
  time_step_ms: 8
  max_time_steps: 600
  use_hierarchical_time: false
  coarse_step_ms: 64
  num_coarse: 75

training:
  batch_size: 2                    # per GPU — T4 15 GB; bump to 4 on A100
  grad_accum_steps: 16             # effective batch = 32
  lr: 0.0003
  warmup_steps: 4000
  max_steps: 500000
  max_epochs: 200
  weight_decay: 0.01
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 100
  save_every: 2000                 # frequent saves — Colab sessions disconnect
  eval_every: 2000
  patience: 10
  num_workers: 2                   # Colab CPU limit
  fp16: true                       # T4/V100 support fp16 but NOT bf16
  bf16: false
